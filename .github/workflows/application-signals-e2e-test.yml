# This is a reusable workflow for running the E2E test for Application Signals.
# It is meant to be called from another workflow.
# Read more about reusable workflows: https://docs.github.com/en/actions/using-workflows/reusing-workflows#overview
name: E2E Testing
on:
  workflow_call:
    inputs:
      ec2-default-image-name:
        required: false
        type: string
        default: 'aws-distro-opentelemetry-dotnet-instrumentation-linux-glibc-x64.zip'

permissions:
  id-token: write
  contents: read

concurrency:
  group: '${{ github.workflow }} @ ${{ inputs.aws-region }}'
  cancel-in-progress: false

env:
  RELEASE_PRIVATE_REPOSITORY: ${{secrets.STAGING_ARTIFACTS_ACCESS_ACCOUNT}}.dkr.ecr.us-east-1.amazonaws.com/aws-observability/adot-autoinstrumentation-dotnet-staging
  RELEASE_PRIVATE_REGISTRY: ${{secrets.STAGING_ARTIFACTS_ACCESS_ACCOUNT}}.dkr.ecr.us-east-1.amazonaws.com

jobs:
  build-ecr-staging-image:
    runs-on: ubuntu-latest
    outputs: 
      staging-image: ${{ env.RELEASE_PRIVATE_REPOSITORY }}:staging-linux-amd64-${{github.sha}}
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v3
        with:
          name: ${{ inputs.ec2-default-image-name }}
          path: ./artifacts/linux/x64
          
      - name: Unzip Linux Artifact
        run: |
          unzip ./artifacts/linux/x64/*.zip -d ./OpenTelemetryDistribution
          
      - name: Configure AWS credentials for private ECR
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.STAING_ARTIFACTS_ACCESS_ROLE }}
          role-external-id: ApplicationSignalsDotnet
          aws-region: ${{ env.AWS_PRIVATE_ECR_REGION }}

      - name: Login to Amazon private ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        
      - name: Build And Push Linux container
        if: runner.os == 'Linux'
        run: |
          set -e
          docker build -t ${{ env.RELEASE_PRIVATE_REPOSITORY }}:staging-linux-amd64-${{github.sha}} -f ./Dockerfile.linux .
          docker push ${{ env.RELEASE_PRIVATE_REPOSITORY }}:staging-linux-amd64-${{github.sha}}
      
  upload-main-build:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.STAING_ARTIFACTS_ACCESS_ROLE }}
          role-external-id: ApplicationSignalsDotnet
          aws-region: us-east-1

      - uses: actions/download-artifact@v3
        with:
          name: ${{ inputs.ec2-default-image-name }}

      - name: Upload main-build files to s3
        run: aws s3 cp ./${{ inputs.ec2-default-image-name }} s3://adot-autoinstrumentation-dotnet-staging/${{ inputs.ec2-default-image-name }}

  dotnet-ec2-default-test:
    needs: [ upload-main-build ]
    uses: aws-observability/aws-application-signals-test-framework/.github/workflows/dotnet-ec2-default-test.yml@main
    secrets: inherit
    with:
      aws-region: us-east-1
      caller-workflow-name: 'main-build'
      staging_distro_name: ${{ inputs.ec2-default-image-name }}
      
  dotnet-eks-default-test:
    needs: [ build-ecr-staging-image ]
    uses: aws-observability/aws-application-signals-test-framework/.github/workflows/dotnet-eks-test.yml@main
    with:
      adot-image-name: ${{ needs.build-ecr-staging-image.outputs.staging-image }}
      aws-region: us-east-1
      caller-workflow-name: 'main-build'